<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>Health</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #000000;
  --bg-card: #0d0d0d;
  --bg-secondary: rgba(0, 212, 163, 0.05);
  --bg-input: rgba(0, 212, 163, 0.06);
  --bg-input-focus: rgba(0, 212, 163, 0.10);
  --bg-dropdown: rgba(13, 13, 13, 0.98);

  --border: rgba(0, 212, 163, 0.12);
  --border-soft: rgba(0, 212, 163, 0.07);
  --border-strong: rgba(0, 212, 163, 0.20);

  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.62);
  --text-tertiary: rgba(255, 255, 255, 0.40);
  --text-quaternary: rgba(255, 255, 255, 0.24);

  --accent: #00d4a3;
  --accent-glow: rgba(0, 212, 163, 0.28);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.10);
  --font: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(55% 45% at 15% 10%, rgba(0, 212, 163, 0.08) 0%, transparent 60%),
    radial-gradient(45% 35% at 88% 88%, rgba(0, 212, 163, 0.05) 0%, transparent 60%);
  filter: blur(50px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(0,212,163,0.05) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: max(56px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '//'; font-size: 12px; color: #00d4a3; opacity: 0.75; letter-spacing: 0; }

.water-embed { margin-top: 0; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 4px;
  overflow: hidden;
  color-scheme: light;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
}

::selection { background: rgba(224, 118, 88, 0.25); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0, 212, 163, 0.20); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 163, 0.32); }
</style>
</head>
<body>

<main>
  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// all data stays in your browser</div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>

</body>
</html>
