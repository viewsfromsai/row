<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#eef3ef">
<meta name="color-scheme" content="light">
<title>Health</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #eef3ef;
  --bg-card: #f5faf6;
  --bg-secondary: rgba(5, 150, 105, 0.04);
  --bg-input: rgba(5, 150, 105, 0.05);
  --bg-input-focus: rgba(5, 150, 105, 0.09);
  --bg-dropdown: rgba(245, 250, 246, 0.98);

  --border: rgba(5, 150, 105, 0.13);
  --border-soft: rgba(5, 150, 105, 0.08);
  --border-strong: rgba(5, 150, 105, 0.22);

  --text-primary: #0b1c0d;
  --text-secondary: #2d4a32;
  --text-tertiary: #5a7a5e;
  --text-quaternary: #8aaa8e;

  --accent: #059669;
  --accent-glow: rgba(5, 150, 105, 0.22);
  --warning: #d97706;
  --warning-bg: rgba(217, 119, 6, 0.08);
  --font: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 80% 10%, rgba(5, 150, 105, 0.12) 0%, transparent 60%),
    radial-gradient(50% 40% at 20% 90%, rgba(5, 150, 105, 0.07) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(5,150,105,0.08) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: max(56px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '//'; font-size: 12px; color: #059669; opacity: 0.70; letter-spacing: 0; }

.water-embed { margin-top: 0; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 4px;
  overflow: hidden;
  color-scheme: light;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
}

::selection { background: rgba(224, 118, 88, 0.25); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(5, 150, 105, 0.18); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(5, 150, 105, 0.28); }
</style>
</head>
<body>

<main>
  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// all data stays in your browser</div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>

</body>
</html>
