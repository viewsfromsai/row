<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --bg-input: rgba(0, 0, 0, 0.28);
  --bg-input-focus: rgba(0, 0, 0, 0.36);
  --bg-dropdown: rgba(15, 15, 18, 0.96);

  --border: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.04);
  --border-strong: rgba(255, 255, 255, 0.12);

  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --accent: #1D9E75;
  --accent-glow: rgba(29, 158, 117, 0.35);
  --warning: #FF8A4D;
  --warning-bg: rgba(163, 45, 45, 0.10);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: max(56px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.water-embed { margin-top: 0; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 16px;
  overflow: hidden;
  color-scheme: dark;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>
</head>
<body>

<main>
  <section id="water" class="water-embed">
    <div class="section-title">Water Tracker</div>
    <iframe src="po-water.html" class="water-iframe" loading="lazy" title="Water Tracker"></iframe>
  </section>

  <div class="attribution">// all data stays in your browser</div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['po_water_v1'],
    onApplied: function () { window.dispatchEvent(new Event('storage')); }
  });
});
</script>

</body>
</html>
